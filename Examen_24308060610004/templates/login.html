<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #fdf2f8;
        }

        .btn-rosa {
            background-color: #f472b6;
            color: white;
        }

        .btn-rosa:hover {
            background-color: #ec4899;
        }

        .titulo {
            color: #b63068; 
            font-weight: bold;
        }
    </style>
</head>

<body>

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-4">

            <div class="card shadow-sm">
                <div class="card-body">
                    <h4 class="text-center titulo mb-3">Iniciar sesión</h4>

                    <form method="POST">
                        <input class="form-control mb-3" name="email" placeholder="Correo">
                        <input class="form-control mb-3" type="password" name="password" placeholder="Contraseña">

                        <button class="btn btn-rosa w-100">Entrar</button>
                    </form>

                    {% with mensajes = get_flashed_messages() %}
                        {% if mensajes %}
                            <div class="alert alert-danger mt-3 text-center">
                                {{ mensajes[0] }}
                            </div>
                        {% endif %}
                    {% endwith %}

                    <div class="text-center mt-3">
                        <a href="/signup" class="text-danger text-decoration-none fw-semibold">Crear cuenta</a><br>
                        <a href="/reset" class="text-secondary text-decoration-none">Recuperar contraseña</a>
                    </div>

                </div>
            </div>

        </div>
    </div>
</div>

</body>
</html>
